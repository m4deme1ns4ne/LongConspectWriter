# STT-Agent
# ==================


stt_init_config:
  model_size_or_path: "large-v3-turbo"
  device: null
  compute_type: null

stt_gen_config:
  beam_size: 5
  vad_filter: true
  condition_on_previous_text: false
  no_speech_threshold: 0.45
  compression_ratio_threshold: 2.4
  language: "ru"
  vad_parameters:
    min_silence_duration_ms: 500
    speech_pad_ms: 400
    threshold: 0.7

stt_app_config:
  output_dir: "data/example-transcrib"


# Drafter-Agent
# ==================

drafter_init_config:
  pretrained_model_name_or_path: "Qwen/Qwen2.5-7B-Instruct"
  torch_dtype: null
  device_map: null
  trust_remote_code: false
  attn_implementation: "sdpa"
  quantization_config:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true
    bnb_4bit_compute_dtype: null


drafter_gen_config:
  max_new_tokens: 500
  repetition_penalty: 1.15
  temperature: 0.1
  top_p: 0.9
  do_sample: true
  guidance_scale: 1.5

drafter_app_config:
  agent_name: "drafter"
  prompt_path: "src/configs/prompts.yaml"
  output_dir: "data/example-mini-conspect"


# Syntizer-Agent
# ==================


synthesizer_init_config:
  pretrained_model_name_or_path: "THUDM/LongWriter-llama3.1-8b"
  torch_dtype: null
  device_map: null
  trust_remote_code: true
  attn_implementation: "sdpa"
  quantization_config:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true
    bnb_4bit_compute_dtype: null


synthesizer_gen_config:
  max_new_tokens: 4096
  repetition_penalty: 1.05
  temperature: 0.5
  top_p: 0.9
  do_sample: true

synthesizer_app_config:
  agent_name: "synthesizer"
  prompt_path: "src/configs/prompts.yaml"
  output_dir: "data/example-conspect"


