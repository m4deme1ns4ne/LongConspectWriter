      3. Главная мысль — это физический закон, явление, принцип, вывод формулы или результат эксперимента. Сформулируй её как связное предложение с физическим контекстом.
      4. Придумай короткую метку темы (2–4 слова) — она нужна для группировки тезисов в главы.

