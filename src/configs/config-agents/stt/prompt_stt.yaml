stt:
  # Универсальный промпт
  universal: >
    Здравствуйте! Готовы ли вы начать? Сегодня тема лекции — «Основы STEM и IT»: мы разберем алгоритмы, дифференциальные уравнения и проектирование API, то есть Application Programming Interface. Задача не из простых; однако мы изучим работу с Data, архитектуру систем — например, использование Python, Docker, а также базовые функции f(x), y и z. Итак, приступим!

  # Специфические промпты под разные доменные области
  programming: >
    Здравствуйте! Готовы ли вы начать? Сегодня тема лекции — «Основы Computer Science»: мы разберем Python, проектирование API и СУБД (PostgreSQL). Задача не из простых; однако мы изучим паттерны ООП, работу с FastAPI и парсинг JSON. Итак, приступим!

  math: >
    Здравствуйте! Готовы ли вы начать? Сегодня тема лекции — «Высшая математика»: мы разберем дифференциальные уравнения, интегралы и матрицы. Задача не из простых; однако мы докажем теоремы — например, про пределы функции и ряды Тейлора (Taylor series). Итак, приступим!

  machine_learning: >
    Здравствуйте! Готовы ли вы начать? Сегодня тема лекции — «Machine Learning»: мы разберем градиентный спуск, нейросети и датасеты (Datasets). Задача не из простых; однако мы изучим PyTorch, работу с Pandas — например, обучение трансформеров (Transformers) и метрики Loss. Итак, приступим!

  biology: >
    Здравствуйте! Готовы ли вы начать? Сегодня тема лекции — «Биология и генетика»: мы разберем ДНК, клетки и метаболизм. Задача не из простых; однако мы изучим биосинтез — например, цикл Кребса (Krebs cycle) и матричную RNA. Итак, приступим!

  chemistry: >
    Здравствуйте! Готовы ли вы начать? Сегодня тема лекции — «Общая химия»: мы разберем синтез молекул, реагенты и растворы. Задача не из простых; однако мы изучим химические реакции — например, ковалентные связи (Covalent bonds) и окислительно-восстановительные процессы (Redox). Итак, приступим!
