# Drafter-Agent

init_config:
  model_path: ".models/T-lite-it-2.1-Q5_K_M.gguf"
  n_gpu_layers: -1
  n_ctx: 8192
  verbose: false

gen_config:
  max_tokens: 512
  repeat_penalty: 1.15
  temperature: 0.2
  presence_penalty: 0.05
