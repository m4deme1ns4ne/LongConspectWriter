# Drafter-Agent

init_config:
  model_path: ".models/T-lite-it-2.1-Q6_K.gguf"
  n_gpu_layers: -1
  n_ctx: 8192
  verbose: false

gen_config:
  max_tokens: 512
  repeat_penalty: 1.0
  temperature: 0.1
  top_p: 0.8
  top_k: 20

app_config:
  agent_name: "drafter"
  prompt_path: "src/configs/config-agents/drafter/prompt_drafter.yaml"
  output_dir: "data/example-conspect"
