# AgentSynthesizer

init_config:
  model_path: ".models/T-lite-it-2.1-Q4_K_M.gguf"
  n_gpu_layers: -1
  n_ctx: 8192
  verbose: false

gen_config:
  max_tokens: 1024
  repeat_penalty: 1.0
  temperature: 0.5
  top_p: 0.8
  top_k: 20

app_config:
  agent_name: "synthesizer"
  prompt_path: "src/configs/config-agents/synthesizer/prompt_synthesizer.yaml"
  output_dir: "data/example-conspect"
  backend: "llamacpp" # или "transformers"