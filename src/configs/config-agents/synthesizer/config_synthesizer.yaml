# AgentSynthesizer

init_config:
  repo_id: "t-tech/T-lite-it-2.1-GGUF"
  filename: "T-lite-it-2.1-Q5_K_M.gguf"
  n_gpu_layers: -1
  n_ctx: 8192
  verbose: false

gen_config:
  max_tokens: 2048
  repeat_penalty: 1.05
  temperature: 0
  presence_penalty: 0.0
  min_p: 0.15

app_config:
  agent_name: "synthesizer"
  prompt_path: "src/configs/config-agents/synthesizer/prompt_synthesizer.yaml"
  chunk_size_ratio: 0.7
  chunk_overlap_ratio: 0.25
  last_tail_words_count: 50
  name_stage_dir: "06_synthesizer/"
