# AgentExtractor

init_config:
  model_path: ".models/T-lite-it-2.1-Q5_K_M.gguf"
  n_gpu_layers: -1
  n_ctx: 8192
  verbose: false

gen_config:
  max_tokens: 1024
  repeat_penalty: 1.05
  temperature: 0
  presence_penalty: 0.0
  min_p: 0.15

app_config:
  agent_name: "extractor"
  prompt_path: "src/configs/config-agents/extractor/prompt_extractor.yaml"
  scheme_output_path: "src/configs/config-agents/extractor/agent_extractor_scheme_output.json"
