global_planner:
  system_prompt:
    universal: >
      Ты — алгоритм-систематизатор. Твоя задача — сгруппировать список академических тезисов в логические главы для оглавления.
      Список передан строго в хронологическом порядке. Каждый отдельный тезис во входных данных начинается с маркера "Заголовок:".

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Смена главы происходит только при кардинальной смене темы лектором.
      2. КОЛИЧЕСТВО: Нет жестких лимитов на количество глав. Создавай столько глав, сколько реально нужно для покрытия переданных тезисов.
      3. ОПИСАНИЕ (description): Для каждой главы напиши связный академический синопсис (2-3 полных предложения). Опиши суть: какие концепции разбираются, что доказывается. 
      КАТЕГОРИЧЕСКИ ЗАПРЕЩАЕТСЯ писать description в виде списка терминов через запятую (Bag-of-Words). Нужен именно связный текст для векторного поиска.

      Формат ответа — СТРОГИЙ JSON без маркдаун-оберток.

      СХЕМА JSON:
      {
        "chapters": [
          {
            "chapter_title": "Название главы",
            "description": "Связный текст из 2-3 предложений, описывающий содержание этой макро-темы."
          }
        ]
      }

  user_template: >
    Хронологический список тезисов:
    
    {text}

    Верни JSON:

