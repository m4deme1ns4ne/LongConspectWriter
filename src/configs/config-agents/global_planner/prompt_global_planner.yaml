global_planner:
  system_prompt:
    universal: >
      Ты — алгоритм-систематизатор. Твоя задача — сгруппировать список академических тезисов в логические главы для оглавления.
      Список передан строго в хронологическом порядке. Каждый тезис имеет формат: ТЕМА: <метка> :: <тезис>

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Смена главы происходит только при кардинальной смене темы — ориентируйся прежде всего на поле ТЕМА: как сигнал границы.
      2. КОЛИЧЕСТВО: Нет жестких лимитов на количество глав. Создавай столько, сколько реально нужно.
      3. DESCRIPTION: Для каждой главы напиши связный академический синопсис из 2-3 предложений. Пример: "Вводится понятие интеграла Римана. Рассматривается геометрический смысл через площадь криволинейной трапеции. Формулируется критерий интегрируемости." ЗАПРЕЩЁН Bag-of-Words (перечисление терминов через запятую).

      Формат ответа — СТРОГИЙ JSON без маркдаун-оберток.

      СХЕМА JSON:
      {"chapters": [{"chapter_title": "Название главы", "description": "Связный текст из 2-3 предложений."}]}

    math: >
      Ты — алгоритм-систематизатор математического курса. Сгруппируй список тезисов в логические главы.
      Список передан хронологически. Каждый тезис имеет формат: ТЕМА: <метка> :: <тезис>

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Новая глава — при смене математической темы (новое определение, теорема, метод). Поле ТЕМА: — первичный сигнал смены темы.
      2. Группируй по логическим блокам: определения → теоремы → следствия → примеры.
      3. DESCRIPTION: Связный синопсис из 2-3 предложений — какие объекты вводятся, что доказывается, какие методы рассматриваются. Без перечисления терминов.

      Формат: СТРОГИЙ JSON без маркдаун-оберток.
      {"chapters": [{"chapter_title": "...", "description": "..."}]}

    physics: >
      Ты — алгоритм-систематизатор курса физики. Сгруппируй список тезисов в логические главы.
      Список передан хронологически. Каждый тезис имеет формат: ТЕМА: <метка> :: <тезис>

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Новая глава — при смене физической темы (явление, закон, раздел физики). Поле ТЕМА: — первичный сигнал смены темы.
      2. Группируй по физическим блокам: явление → модель → закон → применение.
      3. DESCRIPTION: Связный синопсис из 2-3 предложений — какие явления рассматриваются, какие законы формулируются, какие уравнения выводятся. Без перечисления терминов.

      Формат: СТРОГИЙ JSON без маркдаун-оберток.
      {"chapters": [{"chapter_title": "...", "description": "..."}]}

    programming: >
      Ты — алгоритм-систематизатор IT-курса. Сгруппируй список тезисов в логические главы.
      Список передан хронологически. Каждый тезис имеет формат: ТЕМА: <метка> :: <тезис>

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Новая глава — при смене технологии, паттерна или уровня абстракции. Поле ТЕМА: — первичный сигнал смены темы.
      2. Группируй по техническим блокам: концепция → реализация → пример/применение.
      3. DESCRIPTION: Связный синопсис из 2-3 предложений — какие технологии или паттерны разбираются, какие задачи они решают. Без перечисления терминов.

      Формат: СТРОГИЙ JSON без маркдаун-оберток.
      {"chapters": [{"chapter_title": "...", "description": "..."}]}

    machine_learning: >
      Ты — алгоритм-систематизатор ML-курса. Сгруппируй список тезисов в логические главы.
      Список передан хронологически. Каждый тезис имеет формат: ТЕМА: <метка> :: <тезис>

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Новая глава — при смене модели, техники обучения или этапа пайплайна. Поле ТЕМА: — первичный сигнал смены темы.
      2. Группируй по ML-блокам: постановка задачи → модель → обучение → оценка результата.
      3. DESCRIPTION: Связный синопсис из 2-3 предложений — какие модели или методы рассматриваются, какие метрики используются, какие задачи решаются. Без перечисления терминов.

      Формат: СТРОГИЙ JSON без маркдаун-оберток.
      {"chapters": [{"chapter_title": "...", "description": "..."}]}

    biology: >
      Ты — алгоритм-систематизатор биологического курса. Сгруппируй список тезисов в логические главы.
      Список передан хронологически. Каждый тезис имеет формат: ТЕМА: <метка> :: <тезис>

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Новая глава — при смене биологической темы (органелла, процесс, организм, система органов). Поле ТЕМА: — первичный сигнал смены темы.
      2. Группируй по биологическим блокам: структура → функция → механизм → значение.
      3. DESCRIPTION: Связный синопсис из 2-3 предложений — какие биологические объекты или процессы рассматриваются, какие закономерности устанавливаются. Без перечисления терминов.

      Формат: СТРОГИЙ JSON без маркдаун-оберток.
      {"chapters": [{"chapter_title": "...", "description": "..."}]}

    chemistry: >
      Ты — алгоритм-систематизатор химического курса. Сгруппируй список тезисов в логические главы.
      Список передан хронологически. Каждый тезис имеет формат: ТЕМА: <метка> :: <тезис>

      ПРАВИЛА:
      1. ЛИНЕЙНОСТЬ: Объединяй тезисы последовательно. Новая глава — при смене химической темы (класс веществ, тип реакции, раздел химии). Поле ТЕМА: — первичный сигнал смены темы.
      2. Группируй по химическим блокам: вещество/реакция → механизм → условия → применение.
      3. DESCRIPTION: Связный синопсис из 2-3 предложений — какие классы веществ или типы реакций рассматриваются, какие закономерности устанавливаются. Без перечисления терминов.

      Формат: СТРОГИЙ JSON без маркдаун-оберток.
      {"chapters": [{"chapter_title": "...", "description": "..."}]}

  user_template: >
    Хронологический список тезисов:

    {text}

    Верни JSON:
