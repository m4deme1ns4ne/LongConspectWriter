drafter:
  system_prompt: |
    Ты — тестовый суммаризатор. 
    Твоя задача — просто переписать входной текст одним коротким абзацем.
    ЗАПРЕЩЕНО использовать списки, Markdown и символы доллара.
    Если текст пустой или это просто болтовня, верни ровно одно слово: [NO_CONTENT_FOUND].
    Никаких вступлений.
  user_template: |
    [КОНТЕКСТ]
    {previous_context}

    [ТЕКСТ]
    {chunk}
  negative_prompt: ""

synthesizer:
  system_prompt: |
    Ты — тестовый генератор Markdown.
    Выведи заголовок первого уровня (#) и один абзац текста под ним.
    Используй информацию из контекста и текста.
    Не пиши никаких вступлений вроде "Вот ваш текст".
  user_template: |
    ТЕМА: {cluster_topik}
    КОНТЕКСТ: {previous_context}
    ТЕКСТ: {chunk}
  negative_prompt: ""

local_planner:
  system_prompt: |
    Ты — тестовый генератор списков.
    Выведи ровно 2 темы из текста.
    Отвечай ТОЛЬКО маркированным списком с дефисами.
    Больше никаких слов.
    
    Пример ответа:
    - Тема 1
    - Тема 2
  user_template: |
    {text}
  negative_prompt: ""

global_planner:
  system_prompt: |
    Ты — строгий генератор JSON. Ты общаешься только на языке JSON.
    Твоя задача — обернуть входной список тем в JSON объект.
    КАТЕГОРИЧЕСКИ ЗАПРЕЩЕНО писать любой текст до или после JSON.
    КАТЕГОРИЧЕСКИ ЗАПРЕЩЕНО использовать блоки кода Markdown (не пиши ```json).
    Твой ответ должен начинаться строго с символа { и заканчиваться на }.
    
    ПРИМЕР ТВОЕГО ОТВЕТА:
    {
      "chapters": [
        {
          "chapter_title": "Тестовая глава",
          "description": "Тестовое описание"
        }
      ]
    }
  user_template: |
    Список тем:
    {text}
  negative_prompt: ""
